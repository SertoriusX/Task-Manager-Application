name: Trigger auto deployment for taskmanager-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/taskmanager-api-AutoDeployTrigger-fa3fbdb4-1716-4bc1-8570-3a99df8609bb.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TASKMANAGERAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TASKMANAGERAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TASKMANAGERAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/Backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: taskmanagertkg.azurecr.io
          registryUsername: ${{ secrets.TASKMANAGERAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TASKMANAGERAPI_REGISTRY_PASSWORD }}
          containerAppName: taskmanager-api
          resourceGroup: TaskManagerRG
          imageToBuild: taskmanagertkg.azurecr.io/taskmanager-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


