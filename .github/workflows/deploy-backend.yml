name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build
        run: dotnet build Backend/Full-Stack\ Task\ Manager.csproj -c Release

      - name: Publish
        run: dotnet publish Backend/Full-Stack\ Task\ Manager.csproj -c Release -o publish

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push container image
        run: |
          az acr build --registry ${{ secrets.ACR_NAME }} --image taskmanager-api:${{ github.sha }} --file Backend/Dockerfile .

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update --name taskmanager-api --resource-group TaskManagerRG --image ${{ secrets.ACR_NAME }}.azurecr.io/taskmanager-api:${{ github.sha }}
